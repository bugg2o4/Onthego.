<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Onthego.</title>
       <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    </head>
    <body>
        <div class="top-bar">
            <div class="top-left">Shop Onthego.</div>
            <div class="top-center"><span class="arrow left">&#10094;</span> Satisfy Your Outdoor Needs <span class="arrow right">&#10095;</span></div>
            <div class="top-right"></div>
        </div>

        <header class="navibar">
            <div class="na i-left">
                <div class="logo">
                 <img src="{{ url_for('static', filename='img/fontbolt.png') }}">
             </div>
        </div>

            <div class="navi-center">
                <input type="text" class="search-input" placeholder="Search for apparel">
            </div>

            <div class="navi-right">
                <div id="userMenu" class="user-menu hidden">
    <span id="userName"></span>
    <div class="dropdown">
    <a href="/order-history" id="ordersLink">Orders</a>

    <a href="/admin" id="adminLink" class="hidden">Dashboard</a>

    <a href="#" id="logoutBtn">Logout</a>
</div>
</div>

<a href="/signup" id="loginBtn">👤</a>
                <a href="#" class="wishlist-icon" id="wishlist-toggle"><i class="fa fa-heart"></i></a>
                <div class="carticon"><a href="/checkout">𖠩</a></div>
            </div>
        </header>

        <div id="wishlist-drawer" class="wishlist-drawer">
    <div class="wishlist-header">
        <h2>Wishlist</h2>
        <span id="close-wishlist">✕</span>
    </div>

    <div id="wishlist-items"></div>
</div>

<div id="wishlist-overlay"></div>

        <div class="hero">
            <div class="hero-wrapper">

            <div class="hero-left">

            <div class="hero-slider">
                <div class="slides active">
                    <img src="https://images.unsplash.com/photo-1526772662000-3f88f10405ff?q=80&w=1074&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D">
                    <div class="hero-content">
                        <h1>SHOP FROM INDEPENDENT BRANDS</h1>
                        <p>Discover unique products from trusted vendors all in one place</p>
                    </div>
                </div>
            </div>
           </div>
        </div>
    </div>

    <nav class="tabs">
        <a href="#" data-category="all" class="sale">All Products</a>
        <a href="#" data-category="women">Women</a>
        <a href="#" data-category="men">Men</a>
        <a href="#" data-category="kids">Kids</a>
        <a href="#" data-category="pets">Pets</a>
        <a href="#" data-category="accessories">Accessories</a>
    </nav>

    <div id="products-start"></div>
    <div id="product-grid"></div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    </body>
</html>
